<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    
        /* Default desktop */
    .content {
      margin-left: 220px;
      padding: 1em;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .content {
        margin-left: 0;
      }
      .sidebar {
        position: relative;
        width: 100%;
      }
    }
    .sidebar {
  width: 200px;
  position: fixed;
  top: 0;
  left: -220px; /* hide off-screen */
  bottom: 0;
  background: #f4f4f4;
  padding: 1em;
  border-right: 1px solid #ccc;
  box-sizing: border-box;
  transition: left 0.3s ease;
  z-index: 1000;
}

.sidebar.open {
  left: 0; /* slides in */
}

.menu-toggle {
  position: fixed;
  top: 1em;
  left: 1em;
  font-size: 1.5em;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 1100;
}

.content {
  margin-left: 200px; /* leave space for sidebar on desktop */
  padding: 1em;
}

@media (max-width: 768px) {
  .sidebar {
    left: -220px; /* hidden by default */
  }

  .sidebar.open {
    left: 0;
  }

  .content {
    margin-left: 0; /* content fills screen */
  }

  .menu-toggle {
    display: block;
  }
}


  </style>
  <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
  ☰
  </button>

</head>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.querySelector(".menu-toggle").addEventListener("click", function() {
      document.querySelector(".sidebar").classList.toggle("open");
    });
  });
</script>

<body>
  {% include sidebar.html %}
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
