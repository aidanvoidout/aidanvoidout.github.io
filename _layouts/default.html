<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Jekyll’s main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-wrapper">
    <!-- Sidebar (desktop) -->
    <nav class="sidebar">
      <h2 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h2>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/writeups/' | relative_url }}">Writeups</a></li>
      </ul>
    </nav>

    <!-- Header (mobile) -->
    <header class="mobile-header">
      <div class="mobile-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
      <nav class="mobile-nav">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/writeups/' | relative_url }}">Writeups</a>
      </nav>
    </header>

    <!-- Main content -->
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
